<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Complete Payment</title>

  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#050505;
      color:white;
      font-family:'Inter',sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      overflow:hidden;
    }

    body::before{
      content:'';
      position:fixed;
      inset:0;
      background:
      radial-gradient(circle at top right, rgba(139,44,245,0.15), transparent 30%);
      pointer-events:none;
    }

    .card{
      width:100%;
      max-width:500px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:28px;
      padding:50px 35px;
      text-align:center;
      backdrop-filter:blur(12px);
      box-shadow:0 0 40px rgba(139,44,245,0.12);
    }

    h1{
      font-family:'Anton',sans-serif;
      font-size:3.2rem;
      text-transform:uppercase;
      line-height:1;
      margin-bottom:20px;
      letter-spacing:1px;
    }

    h1 span{
      color:#8b2cf5;
    }

    p{
      color:#cfcfcf;
      line-height:1.7;
      margin-bottom:30px;
    }

    .amount{
      font-size:4rem;
      color:#a855f7;
      font-weight:800;
      margin-bottom:35px;
    }

    .pay-btn{
      display:inline-block;
      width:100%;
      background:#8b2cf5;
      color:white;
      text-decoration:none;
      padding:18px;
      border-radius:16px;
      font-weight:700;
      transition:0.3s ease;
      box-shadow:0 0 30px rgba(139,44,245,0.3);
    }

    .pay-btn:hover{
      transform:translateY(-4px);
      background:#a855f7;
    }

    .back{
      display:inline-block;
      margin-top:20px;
      color:#9a9a9a;
      text-decoration:none;
    }

    .back:hover{
      color:white;
    }
  </style>
</head>
<body>

  <div class="card">

    <h1>
      Complete <span>Payment</span>
    </h1>

    <p>
      Your application has been submitted successfully.
      Complete the payment to secure your coaching slot.
    </p>

    <div class="amount" id="amount">
      ₹0
    </div>

    <a class="pay-btn" id="payBtn">
      Pay with UPI
    </a>

    <a href="index.html" class="back">
      Return to Home
    </a>

  </div>

  <script>

    const params = new URLSearchParams(window.location.search);

    const amount = params.get('amount') || '0';

    document.getElementById('amount').innerText = `₹${amount}`;

    const upiLink =
    `upi://pay?pa=yohanrocks17dec@oksbi&pn=Yohan%20Fernandes&am=${amount}&cu=INR`;

    document.getElementById('payBtn').href = upiLink;

  </script>

</body>
</html>
